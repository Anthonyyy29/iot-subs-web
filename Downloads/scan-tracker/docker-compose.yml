services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    # Port 3306 sengaja TIDAK di-expose ke host karena server ini dipakai bareng
    # proyek lain (kemungkinan port 3306 host udah kepake MySQL/container lain).
    # Bridge & web tetap bisa akses mysql lewat docker network internal (DB_HOST=mysql).
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  bridge:
    build: ./bridge
    restart: always
    environment:
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      MQTT_TOPIC: ${MQTT_TOPIC}
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build: ./web
    restart: always
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - default
      - proxy-net

networks:
  proxy-net:
    external: true

volumes:
  db_data: